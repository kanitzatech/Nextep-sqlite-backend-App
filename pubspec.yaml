version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Existing packages
  url_launcher: ^6.3.1
  pdf: ^3.11.1
  printing: ^5.13.4

  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  
  google_sign_in: ^6.3.0
